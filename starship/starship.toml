command_timeout = 1000

scan_timeout = 10

add_newline = true

# palette = "catppuccin_mocha"

format = """
$localip\
$shlvl\
$singularity\
$kubernetes\
$directory\
$vcsh\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$julia\
$kotlin\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$java\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$env_var\
$crystal\
$custom\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$battery\
$time\
$status\
$os\
$container\
$shell\
$character"""

[hostname]
disabled = false
style = "bold fg:green"
ssh_only = true
format = "[$hostname]($style) in"
# Linux
# оң’
# Windows
# оңҸ
# mac/apple
# оң‘

[line_break]
disabled = true

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style)'
time_format = '%T'
utc_time_offset = 'local'

# п„   О» вқҜ вң—

[character]
# success_symbol = "[ п„ ](bold green)"
success_symbol = "[О»](bold green)"
# success_symbol = "[вқҜ](bold green)"
error_symbol = "[О»](bold red)"
# error_symbol = "[вң—](bold red)"

[cmd_duration]
disabled = true

[memory_usage]
symbol = "пЎҡ "

[package]
disabled = true

# [directory]
# truncation_length = 1
# format = "[пҗ“](blue) [$path]($style)[$read_only]($read_only_style) "
# read_only = " пҖЈ"
# truncation_symbol = ""
# fish_style_pwd_dir_length = 0
# style= "blue"

[directory]
truncation_length = 1
home_symbol = 'пқӢ '
truncation_symbol = 'п’Ү  '
read_only = 'пҖЈ '
style = 'blue'
read_only_style = 'blue'
format = '[$read_only]($read_only_style)[$path]($style) '

[directory.substitutions]
'/' = ' п‘  '
"пқӢ  п‘  Dev" = 'п„Ў '
"пқӢ  п‘  dev" = 'п„Ў '
# "пқӢ  п‘  Dev" = 'о©№ '
'пқӢ  п‘  Downloads' = 'пқҢ '
'пқӢ  п‘  downloads' = 'пқҢ '
"пқӢ  п‘  OneDrive" = 'пғӮ '
# "пқӢ  п‘  Documents" = 'пқ’ '
# "пқӢ  п‘  documents" = 'пқ’ '
"пқӢ  п‘  Pictures" = "пҖҫ "
"пқӢ  п‘  pictures" = "пҖҫ "
"пқӢ  п‘  Documents" = 'пңҳ '
"пқӢ  п‘  documents" = 'пңҳ '
"пқӢ  п‘  .config" = 'пҖ“ '
# "пқӢ  п‘  .config" = 'оҲҸ '

[git_commit]
# пҖ«
# пҗ—
# о«ј
# пҗҷ
format = ' [пҗ— $hash]($style)'
commit_hash_length = 8
style = '#c882e7'

[git_branch]
format = " [$symbol$branch]($style)"
# format = "[оӮ¶](fg:bright-black)[$symbol$branch(:$remote_branch)]($style)[оӮҙ](fg:bright-black) "
symbol = "оңҘ "
style = '#c882e7'
# style = "bg:bright-black fg:#c882e7"

[git_state]
format = '\(:[$state( $progress_current/$progress_total)]($style)\)'

[git_status]
# with bracket
# format = '( [$all_status$ahead_behind]($style)) '
# conflicted = '\[п № [$count](bright-black bold)\]'
# ahead = '\[[пҜҒ ](bright-blue)[$count](white bold)\]'
# behind = '\[[п®ҫ ](white)[$count](white bold)\]'
# diverged = '\[[оңЁ ](purple)|[ пҜҒ ](bright-blue)[$ahead_count](bright-white bold)[ п®ҫ ](white)[$behind_count](bright-white)\]'
# untracked = '\[пҠң [$count](white bold)\]'
# stashed = '\[[пЈ–](yellow) [$count](white bold)\]'
# modified = '\[[п”Ұ ](bright-yellow)[$count](white bold)\]'
# staged = '\[[п‘— ](bright-green)[$count](white bold)\]'
# renamed = '\[[вңҺ](bright-cyan) [$count](white bold)\]'
# deleted = '\[пҖ” [$count](white bold)\]'
# style = "yellow"

# without bracket
format = '( [$all_status$ahead_behind]($style)) '
conflicted = 'п № '
ahead = 'пҜҒ '
behind = 'п®ҫ '
diverged = 'оңЁ '
untracked = 'пҠң '
stashed = 'пЈ– '
modified = 'п‘« '
staged = 'п‘— '
renamed = 'п‘Ҳ '
deleted = 'пҖ” '
style = "bright-yellow"

[nodejs]
format = '[$symbol]($style)'
symbol = "оңҳ "
# symbol = "оқҺ "
# symbol = "оһҒ "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules", "!.config"]
style = "#8BC34A"
# style = "#F0DB4F"

[java]
# symbol = "пғҙ "
symbol = "пҷөвҖү"
# symbol = "оңёвҖү"
style = "#F4443e"
# style = "#5382A1"
format = '[$symbol]($style)'

[lua]
symbol = "оҳ  "
format = '[$symbol]($style)'
style = "#42A5F5"

[python]
# symbol = "оҲө "
symbol = "п ҹ "
format = '[$symbol]($style)'
style = "#3776AB"
#
[ruby]
symbol = "оһ‘ "
# symbol = "оң№ "
format = '[$symbol]($style)'
style = "#CC342D"

[golang]
symbol = "пі‘ "
format = '[$symbol]($style)'
style = "#20ADC2"

[c]
symbol = "пӯ° "
format = '[$symbol]($style)'
style = '#0277BD'

[docker_context]
disabled = true
symbol = "пҢҲ "
format = '[$symbol]($style)'
style = "#0F9AD5"
detect_files = ["Dockerfile"]

[elixir]
symbol = "оүө "
format = '[$symbol]($style)'
# style = "#4B275F"
style = "#9575CD"
detect_extensions = ["ex", "exs"]

[rust]
symbol = "пҢЈ "
# symbol = "оһЁ"
style = "#FA6F42"
format = '[$symbol]($style)'

[swift]
symbol = "пҜЈ "
style = "#F05138"
format = '[$symbol]($style)'

[custom.cpp]
detect_extensions = ["cpp"]
format = '[$symbol]($style)'
symbol = 'пӯұ '
# symbol = 'оҳқ '
style = '#0277BD'

[custom.cs]
detect_extensions = ["cs", "csx"]
format = '[$symbol]($style)'
symbol = 'п ҡ '
style = '#0277BD'

[custom.vue]
detect_files = [
  "nuxt.config.js",
  "vue.config.js",
  "nuxt.config.ts",
  "vue.config.ts",
]
detect_extensions = ["vue", "nuxt"]
format = "[$symbol]($style)"
symbol = "пөӮ "
style = "#41B883"

[custom.react]
detect_files = [
  "tsconfig.base.json",
  "next.config.js",
  "next.config.ts",
  "gatsby-config.ts",
]
detect_extensions = ["jsx", "tsx"]
format = "[$symbol]($style)"
symbol = "оһә "
style = "#248ED3"

[custom.yarn]
detect_files = ["yarn.lock"]
detect_folders = [".yarn", "!.config"]
format = "[$symbol]($style)"
symbol = "пҳҡ "
style = "#2D8EBB"

[custom.npm]
detect_files = ["package-lock.json"]
format = "[$symbol]($style)"
symbol = "оңһ "
style = "#C14444"

[custom.gradle]
detect_folders = [".gradle", "!.config"]
format = "[$symbol]($style)"
symbol = "пі„ "
style = "#4CAF51"

[custom.docker]
detect_files = ["Dockerfile", ".dockerignore"]
format = '[$symbol]($style)'
symbol = "пҢҲ "
style = "#2496ED"

